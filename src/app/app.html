<nav class="navbar navbar-expand-lg sticky-top ef-navbar">
  <div class="container">
    <a class="navbar-brand ef-brand" routerLink="/inicio" (click)="closeMenu()">
      <span class="brand-mark">EF</span><span>Equi-Fiber</span>
    </a>
    <button class="navbar-toggler" type="button" (click)="menuOpen = !menuOpen" [attr.aria-expanded]="menuOpen" aria-label="Abrir menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" [class.show]="menuOpen" id="mainNav">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
        <li><a class="nav-link" routerLink="/inicio" routerLinkActive="active" (click)="closeMenu()">Inicio</a></li>
        <li><a class="nav-link" routerLink="/tienda" routerLinkActive="active" (click)="closeMenu()">Tienda</a></li>
        <li>
          <a class="nav-link" routerLink="/carrito" routerLinkActive="active" (click)="closeMenu()">
            Carrito <span class="badge rounded-pill text-bg-success">{{ data.cartCount }}</span>
          </a>
        </li>
        <li *ngIf="data.session && data.session.role !== 'admin'">
          <a class="nav-link" routerLink="/compras" routerLinkActive="active" (click)="closeMenu()">Mis compras</a>
        </li>
        <li *ngIf="data.session?.role === 'admin'">
          <a class="nav-link" routerLink="/admin" routerLinkActive="active" (click)="closeMenu()">Admin</a>
        </li>
        <li *ngIf="!data.session">
          <a class="nav-link" routerLink="/login" routerLinkActive="active" (click)="closeMenu()">Ingresar</a>
        </li>
        <li *ngIf="data.session">
          <a class="nav-link" routerLink="/perfil" routerLinkActive="active" (click)="closeMenu()">Perfil</a>
        </li>
        <li *ngIf="data.session">
          <button class="btn btn-sm btn-outline-dark" type="button" (click)="logout()">Salir</button>
        </li>
      </ul>
    </div>
  </div>
</nav>

<router-outlet></router-outlet>

<footer class="ef-footer">
  <div class="container">
    <strong>Equi-Fiber</strong> | Snacks naturales para caballos
  </div>
</footer>
